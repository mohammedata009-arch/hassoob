<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي محمد طه التفاعلي 2059</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --neon-cyan: #00f2ff; --neon-green: #39ff14; --neon-red: #ff3131; --bg: #050a14; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 900px; margin: auto; background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); padding: 30px; border-radius: 25px; border: 1px solid var(--neon-cyan); box-shadow: 0 0 30px rgba(0,242,255,0.1); }
        h1 { text-align: center; font-family: 'Orbitron', sans-serif; color: var(--neon-cyan); text-shadow: 0 0 15px var(--neon-cyan); }
        .status-bar { display: flex; justify-content: space-between; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 15px; margin-bottom: 25px; border-bottom: 2px solid var(--neon-cyan); }
        .question-box { animation: fadeIn 0.5s ease; }
        .q-text { font-size: 22px; margin-bottom: 25px; line-height: 1.6; }
        .options { display: grid; gap: 15px; }
        .opt-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 18px; border-radius: 12px; cursor: pointer; transition: 0.3s; text-align: right; font-size: 18px; }
        .opt-btn:hover { background: rgba(0, 242, 255, 0.1); border-color: var(--neon-cyan); transform: scale(1.02); }
        .feedback { display: none; margin-top: 25px; padding: 20px; border-radius: 15px; animation: slideUp 0.4s ease; border-right: 8px solid; }
        .correct-bg { background: rgba(57, 255, 20, 0.1); border-color: var(--neon-green); color: var(--neon-green); }
        .wrong-bg { background: rgba(255, 49, 49, 0.1); border-color: var(--neon-red); color: #ff9999; }
        .explanation { color: #ddd; margin-top: 10px; font-size: 16px; line-height: 1.6; }
        .steps { color: var(--neon-cyan); font-weight: bold; font-size: 14px; margin-top: 10px; }
        .next-btn { width: 100%; padding: 15px; background: var(--neon-cyan); color: black; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; display: none; font-size: 18px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>PASCAL CORE 2059</h1>
    <div class="status-bar">
        <div>المتدرب: <span style="color:var(--neon-cyan)">تحت الاختبار</span></div>
        <div>التقدم: <span id="qIdx">1</span> / 30</div>
        <div>الدرجة: <span id="score">0</span></div>
    </div>

    <div id="quiz-area">
        <div class="question-box">
            <div class="q-text" id="qText">جاري استدعاء البيانات...</div>
            <div class="options" id="options"></div>
        </div>
        <div id="feedback" class="feedback">
            <div id="fb-title" style="font-weight: bold; font-size: 20px;"></div>
            <div id="fb-desc" class="explanation"></div>
            <div id="fb-steps" class="steps"></div>
            <button class="next-btn" id="nextBtn" onclick="nextQ()">انتقال للسؤال التالي ⮕</button>
        </div>
    </div>

    <div id="final-screen" style="display:none; text-align:center;">
        <h2 id="final-msg"></h2>
        <div id="final-score" style="font-size:40px; color:var(--neon-cyan); margin: 20px 0;"></div>
        <button class="opt-btn" style="width:100%" onclick="location.reload()">إعادة التحدي</button>
        <button class="opt-btn" style="width:100%; margin-top:10px; background:var(--neon-green); color:black;" onclick="sendWA()">إرسال التقرير للأستاذ محمد طه</button>
    </div>
</div>

<audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
    const quizData = [
        {q: "ما الدالة التي تحول 'رقم الرمز' إلى 'الحرف'؟", a: ["ord(c)", "chr(i)", "abs(x)"], c: 1, exp: "الدالة chr تحول الكود الرقمي للحرف (ASCII).", step: "الخطوة: إدخال رقم -> معالجة كود الرمز -> إخراج الحرف."},
        {q: "نتيجة العملية 10 MOD 3 هي:", a: ["3", "1", "0"], c: 1, exp: "MOD تعطي باقي القسمة. 10 تقسيم 3 يساوي 3 والباقي 1.", step: "الخطوة: قسمة 10 على 3 -> تحديد الباقي الصحيح -> الناتج 1."},
        {q: "أي دالة تعطينا القيمة المطلقة؟", a: ["sqrt(x)", "abs(x)", "sqr(x)"], c: 1, exp: "Abs تجرد العدد من إشارته السالبة.", step: "الخطوة: استقبال عدد -> حذف الإشارة -> ناتج موجب."},
        {q: "المعالج المنطقي AND يعطي True إذا كان:", a: ["كلا الشرطين True", "أحد الشرطين True", "كلا الشرطين False"], c: 0, exp: "AND تتطلب تحقق جميع الشروط معاً.", step: "الخطوة: فحص أ + فحص ب -> إذا الكل محقق -> النتيجة True."},
        {q: "للتعبير عن 'لا يساوي' نستخدم:", a: ["!=", "==", "<>"], c: 2, exp: "باسكال تستخدم الأقواس المتقابلة للاختلاف.", step: "الخطوة: مقارنة القيمتين -> إذا اختلفا -> النتيجة True."},
        {q: "ما وظيفة الدالة Sqr(x)؟", a: ["الجذر التربيعي", "مربع العدد", "تقريب العدد"], c: 1, exp: "Sqr تضرب العدد في نفسه.", step: "الخطوة: س * س = النتيجة."},
        {q: "عند تنفيذ ReadLn(x)، المؤشر ينتقل إلى:", a: ["بداية الملف", "سطر جديد", "نفس السطر"], c: 1, exp: "Ln تعني القفز لسطر جديد بعد القراءة.", step: "الخطوة: قراءة القيمة -> ضغط Enter آلياً -> سطر جديد."},
        {q: "الدالة Odd(x) تختبر هل العدد:", a: ["زوجي", "فردي", "أولي"], c: 1, exp: "Odd ترجع True إذا كان العدد فردياً.", step: "الخطوة: فحص باقي القسمة على 2 -> إذا وجد باقي -> فردي."},
        {q: "لتحويل حرف صغير لـ كبير نستخدم:", a: ["UpCase", "LowCase", "Round"], c: 0, exp: "UpCase ترفع حالة الحرف.", step: "الخطوة: استقبال حرف -> تغيير كود ASCII -> حرف كبير."},
        {q: "الدالة Trunc(5.8) تعطي النتيجة:", a: ["6", "5", "0.8"], c: 1, exp: "Trunc تحذف الكسر تماماً دون تقريب.", step: "الخطوة: تحديد العدد الحقيقي -> حذف ما بعد الفاصلة -> عدد صحيح."},
        {q: "أي نوع بيانات يستوعب القيم (True, False)؟", a: ["Integer", "Boolean", "Char"], c: 1, exp: "البوليان هو النوع المنطقي.", step: "الخطوة: تخزين حالة شرطية فقط."},
        {q: "الكلمة المحجوزة لبدء قسم المتغيرات هي:", a: ["Const", "Begin", "Var"], c: 2, exp: "Var هي اختصار لـ Variables.", step: "الخطوة: حجز مساحة في الذاكرة RAM."},
        {q: "الدالة Round(4.6) تعطي النتيجة:", a: ["4", "5", "4.6"], c: 1, exp: "Round تقرب لأقرب عدد صحيح.", step: "الخطوة: فحص الكسر -> إذا >= 0.5 زِد 1."},
        {q: "المعالج DIV يعطي:", a: ["باقي القسمة", "الناتج الصحيح للقسمة", "القسمة الحقيقية"], c: 1, exp: "DIV تشطب الكسر وتعطي الرقم الصحيح.", step: "الخطوة: قسمة -> حذف الفواصل -> الناتج."},
        {q: "ما هو رمز التخصيص (الإسناد)؟", a: ["=", "==", ":="], c: 2, exp: "النقاط الرأسية مع اليساوي للإسناد.", step: "الخطوة: خذ القيمة من اليمين -> ضعها في اليسار."},
        {q: "الدالة Sqrt(25) نتيجتها هي:", a: ["5", "625", "10"], c: 0, exp: "Sqrt تعطي الجذر التربيعي.", step: "الخطوة: ما العدد الذي مربعه 25؟ -> الناتج 5."},
        {q: "ما هو الحد الأقصى لنوع Byte؟", a: ["127", "255", "32767"], c: 1, exp: "البايت يخزن من 0 إلى 255.", step: "الخطوة: تخزين أرقام صغيرة موجبة فقط."},
        {q: "لتعريف مصفوفة (Array) نستخدم القوس:", a: ["( )", "[ ]", "{ }"], c: 1, exp: "الأقواس المربعة لتعريف المدى.", step: "الخطوة: تحديد البداية والنهاية [1..10]."},
        {q: "المعالج المنطقي OR يعطي True إذا:", a: ["كلا الشرطين True", "أحد الشرطين True", "الشرط الأول False"], c: 1, exp: "OR يكتفي بتحقق شرط واحد فقط.", step: "الخطوة: فحص الخيارات -> إذا وجد صح واحد -> الكل صح."},
        {q: "الكلمة التي ينتهي بها البرنامج تماماً:", a: ["End;", "End.", "Halt;"], c: 1, exp: "النقطة بعد End تعني نهاية الكود المصدري.", step: "الخطوة: إغلاق وحدة المعالجة."},
        {q: "أي دالة تعطي رتبة الحرف في ASCII؟", a: ["chr", "ord", "abs"], c: 1, exp: "ord تعني Order (رتبة).", step: "الخطوة: حرف -> معالجة -> رقم الرتبة."},
        {q: "نوع البيانات للحروف هو:", a: ["String", "Char", "Real"], c: 1, exp: "Char اختصار لـ Character (حرف واحد).", step: "الخطوة: تخزين رمز واحد فقط."},
        {q: "لإزاحة النص لسطر جديد في الطباعة:", a: ["Write", "WriteLn", "Read"], c: 1, exp: "Ln تعني سطر جديد (Line).", step: "الخطوة: طباعة النص -> قفز لسطر جديد."},
        {q: "نتيجة العملية 15 DIV 4 هي:", a: ["3", "3.75", "4"], c: 0, exp: "DIV تأخذ الجزء الصحيح فقط.", step: "الخطوة: 15 / 4 = 3.75 -> حذف 0.75 -> الناتج 3."},
        {q: "الدالة Frac(5.2) تعطي:", a: ["5", "0.2", "5.2"], c: 1, exp: "Frac تعطي الجزء الكسري فقط.", step: "الخطوة: عدد حقيقي -> حذف الصحيح -> الباقي كسر."},
        {q: "المتغير من نوع Integer يستغرق:", a: ["1 بايت", "2 بايت", "4 بايت"], c: 1, exp: "العدد الصحيح التقليدي يحجز 16 بت.", step: "الخطوة: تخصيص مساحة في الذاكرة."},
        {q: "جملة Case تستخدم لـ:", a: ["التكرار", "الاختيار المتعدد", "تعريف المتغيرات"], c: 1, exp: "Case بديل ذكي لـ If المتعددة.", step: "الخطوة: فحص القيمة -> الذهاب للخيار المطابق."},
        {q: "في حلقة For، الكلمة التي تلي To هي:", a: ["Do", "Then", "Begin"], c: 0, exp: "For ... To ... Do.", step: "الخطوة: عداد -> مدى -> تنفيذ فعل."},
        {q: "الدالة Int(7.8) تعطي النتيجة:", a: ["8", "7.0", "7"], c: 1, exp: "Int تعيد الجزء الصحيح كنوع Real (7.0).", step: "الخطوة: تحويل العدد الحقيقي لصحيح بتنسيق حقيقي."},
        {q: "ما رمز التعليق (Comments) في باسكال؟", a: ["//", "{ }", "/* */"], c: 1, exp: "الأقواس المتعرجة للتعليقات.", step: "الخطوة: تجاهل النص أثناء الترجمة."}
    ];

    let currentQ = 0, score = 0;

    function loadQ() {
        const q = quizData[currentQ];
        document.getElementById('qText').innerText = q.q;
        document.getElementById('qIdx').innerText = currentQ + 1;
        const opts = document.getElementById('options');
        opts.innerHTML = '';
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => check(i);
            opts.appendChild(btn);
        });
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none';
    }

    function check(picked) {
        const q = quizData[currentQ];
        const fb = document.getElementById('feedback');
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(b => b.disabled = true);
        fb.style.display = 'block';

        if(picked === q.c) {
            score++;
            document.getElementById('snd-correct').play();
            fb.className = 'feedback correct-bg';
            document.getElementById('fb-title').innerText = "✅ أحسنت! إجابة صحيحة";
        } else {
            document.getElementById('snd-wrong').play();
            fb.className = 'feedback wrong-bg';
            document.getElementById('fb-title').innerText = "❌ انتبه! الإجابة الصحيحة: " + q.a[q.c];
        }

        document.getElementById('fb-desc').innerText = q.exp;
        document.getElementById('fb-steps').innerText = q.step;
        document.getElementById('score').innerText = score;
        document.getElementById('nextBtn').style.display = 'block';
    }

    function nextQ() {
        currentQ++;
        if(currentQ < quizData.length) loadQ();
        else showFinal();
    }

    function showFinal() {
        document.getElementById('quiz-area').style.display = 'none';
        const screen = document.getElementById('final-screen');
        screen.style.display = 'block';
        document.getElementById('final-msg').innerText = score >= 15 ? "تهانينا أيها المتدرب المتميز!" : "محاولة جيدة، ننصح بمراجعة المفاهيم.";
        document.getElementById('final-score').innerText = `${score} / 30`;
    }

    function sendWA() {
        const msg = `*تقرير أداء المتدرب - منصة 2059*%0Aتم إنهاء تحدي الـ 30 سؤالاً.%0Aالنتيجة النهائية: ${score} من 30 ✅`;
        window.open(`https://wa.me/249901946410?text=${msg}`);
    }

    window.onload = loadQ;
</script>
</body>
</html>
